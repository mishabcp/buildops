name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  dependency-and-install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            client/package-lock.json
            server/package-lock.json

      - name: Verify client package-lock (supply chain)
        working-directory: client
        run: node ../scripts/verify-safe-dependencies.mjs

      - name: Verify server package-lock (supply chain)
        working-directory: server
        run: node ../scripts/verify-safe-dependencies.mjs

      - name: npm ci (client)
        working-directory: client
        run: npm ci

      - name: npm ci (server)
        working-directory: server
        run: npm ci
